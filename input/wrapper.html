<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Report Viewer — AMR Export Fix</title>

    <style>
        iframe {
            width: 100%;
            height: 95vh;
            border: none;
        }

        .export-btn {
            display: inline-block;
            margin: 10px 0;
            padding: 6px 12px;
            border: 1px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .export-btn:hover {
            background: #007bff;
            color: white;
        }
    </style>
</head>

<body>
    <h3>📄 Report Viewer (new version with full AMR CSV export)</h3>
    <p>Ця версія автоматично додає <b>Export CSV</b> до всіх таблиць, включно з Antimicrobial Resistance.</p>

    <iframe id="reportFrame" src="wf-metagenomics-report_metagenomics-farms-ukr.html"></iframe>

    <script>
        document.getElementById("reportFrame").onload = function () {
            const iframeDoc = document.getElementById("reportFrame").contentWindow.document;

            // даємо сторінці час намалювати динамічні таблиці AMR
            setTimeout(() => {
                // Hide original Export CSV buttons
                iframeDoc.querySelectorAll('.btn.btn-outline-primary').forEach(btn => {
                    btn.style.display = 'none';
                });

                // 1. Find and expand all AMR accordion items
                const amrSection = iframeDoc.querySelector('#Section_147c951b8a9f46749ea7022ab007c69b');
                if (amrSection) {
                    // Expand all accordion collapses
                    const collapses = amrSection.querySelectorAll('.accordion-collapse.collapse');
                    collapses.forEach(collapse => {
                        collapse.classList.add('show');
                    });

                    // Update button states
                    const accordionBtns = amrSection.querySelectorAll('.accordion-button');
                    accordionBtns.forEach(btn => {
                        btn.classList.remove('collapsed');
                        btn.setAttribute('aria-expanded', 'true');
                    });

                    // 2. Add ONE Export CSV button per barcode accordion
                    const accordions = amrSection.querySelectorAll('[id^="accordian_barcode"]');
                    accordions.forEach(accordion => {
                        const barcodeId = accordion.id.replace('accordian_', '');

                        // Create export button
                        const btn = iframeDoc.createElement("button");
                        btn.textContent = `Export CSV (${barcodeId})`;
                        btn.className = "export-btn";
                        btn.style.marginBottom = "15px";

                        // Insert button before the accordion
                        accordion.insertAdjacentElement("beforebegin", btn);

                        btn.addEventListener("click", () => exportBarcodeData(accordion, barcodeId));
                    });
                }

                // 3. Add Export CSV buttons to all tables OUTSIDE AMR section
                const allTables = iframeDoc.querySelectorAll("table");
                allTables.forEach((table, index) => {
                    // Skip tables inside AMR section (they have per-barcode export)
                    if (amrSection && amrSection.contains(table)) return;

                    // Check if button already exists
                    if (table.nextElementSibling?.classList?.contains('export-btn')) return;

                    const btn = iframeDoc.createElement("button");
                    btn.textContent = "Export CSV";
                    btn.className = "export-btn";
                    table.insertAdjacentElement("afterend", btn);
                    btn.addEventListener("click", () => exportTable(table, index));
                });

            }, 500);

            function exportBarcodeData(accordion, barcodeId) {
                let csv = [];
                // Header row with gene name added
                csv.push("Gene,ReadID,Coverage %,Identity %,Resistance");

                // Find all h2 elements that contain accordion buttons (these are gene headers)
                const geneHeaders = accordion.querySelectorAll('h2');
                geneHeaders.forEach(h2 => {
                    // Get gene name from button
                    const geneNameEl = h2.querySelector('.accordion-button b');
                    const geneName = geneNameEl ? geneNameEl.innerText : 'Unknown';

                    // Get the next sibling which is the collapse div containing the table
                    const collapseDiv = h2.nextElementSibling;
                    if (collapseDiv && collapseDiv.classList.contains('accordion-collapse')) {
                        const table = collapseDiv.querySelector('table');
                        if (table) {
                            const rows = table.querySelectorAll('tbody tr');
                            rows.forEach(row => {
                                const cols = row.querySelectorAll('td');
                                const rowData = [geneName];
                                cols.forEach(col => {
                                    rowData.push(col.innerText.replace(/,/g, ';'));
                                });
                                csv.push(rowData.join(','));
                            });
                        }
                    }
                });

                // Download CSV
                const csvContent = "data:text/csv;charset=utf-8," + csv.join("\n");
                const link = iframeDoc.createElement("a");
                link.href = encodeURI(csvContent);
                link.download = `amr_${barcodeId}.csv`;
                link.click();
            }

            function exportTable(table, index) {
                let csv = [];
                const rows = table.querySelectorAll("tr");

                rows.forEach((row) => {
                    const cols = row.querySelectorAll("th, td");
                    const data = [];

                    cols.forEach((col) => {
                        let text = col.innerText.replace(/,/g, " ");
                        data.push(text);
                    });

                    csv.push(data.join(","));
                });

                const csvContent = "data:text/csv;charset=utf-8," + csv.join("\n");
                const encodedUri = encodeURI(csvContent);

                const link = document.createElement("a");
                link.href = encodedUri;
                link.download = `table_${index + 1}.csv`;
                link.click();
            }
        };
    </script>
</body>
</html>
