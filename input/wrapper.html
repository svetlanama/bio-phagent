<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Report with CSV Export Fix</title>
    <style>
        iframe {
            width: 100%;
            height: 95vh;
            border: none;
        }
        .export-btn {
            display: inline-block;
            margin: 10px 0;
            padding: 6px 12px;
            border: 1px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h3>Report viewer</h3>
    <p>🎉 Тепер кнопки “Export CSV” працюватимуть!</p>

    <iframe id="reportFrame" src="wf-metagenomics-report_metagenomics-farms-ukr.html"></iframe>

    <script>
        // Коли iframe завантажено — додаємо функцію експорту
        document.getElementById("reportFrame").onload = function () {
            const iframe = document.getElementById("reportFrame").contentWindow.document;

            // Знаходимо всі кнопки Export CSV всередині iframe
            const buttons = iframe.querySelectorAll("button, a");

            buttons.forEach((btn) => {
                if (btn.textContent.trim() === "Export CSV") {

                    btn.addEventListener("click", (e) => {
                        e.preventDefault();

                        // шукаємо таблицю над кнопкою
                        let el = btn.previousElementSibling;
                        while (el && el.tagName !== "TABLE") {
                            el = el.previousElementSibling;
                        }
                        if (!el) {
                            alert("Таблицю не знайдено 😢");
                            return;
                        }

                        exportTable(el);
                    });
                }
            });

            function exportTable(table) {
                let csv = [];
                const rows = table.querySelectorAll("tr");

                rows.forEach((row) => {
                    const cols = row.querySelectorAll("th, td");
                    const rowData = [];

                    cols.forEach((col) => {
                        rowData.push(col.innerText.replace(/,/g, ""));
                    });

                    csv.push(rowData.join(","));
                });

                const csvContent = "data:text/csv;charset=utf-8," + csv.join("\n");
                const encodedUri = encodeURI(csvContent);

                const link = document.createElement("a");
                link.href = encodedUri;
                link.download = "table_export.csv";
                link.click();
            }
        };
    </script>
</body>
</html>
